---
# ref. https://docs.ansible.com/projects/ansible/latest/dev_guide/collections_galaxy_meta.html
namespace: ais
name: core
version: 0.1.0
readme: README.md
authors:
  - Australian Imaging Service Team
description: Australian Imaging Service administration and infrastructure
license_file: LICENSE
tags:
  - cloud
  - edge
  - infrastructure
  - kubernetes
  - research

dependencies:
  ansible.utils: ">=6.0.2"
  community.general: ">=10.7.0"

repository: https://github.com/Australian-Imaging-Service/collection
documentation: https://github.com/Australian-Imaging-Service/collection
homepage: https://australian-imaging-service.github.io
issues: https://github.com/Australian-Imaging-Service/collection/issues

build_ignore:
  - /bin/
  - /docs/

# A dict controlling use of manifest directives used in building the collection artifact. The key 'directives' is a
# list of MANIFEST.in style
# L(directives,https://packaging.python.org/en/latest/guides/using-manifest-in/#manifest-in-commands). The key
# 'omit_default_directives' is a boolean that controls whether the default directives are used. Mutually exclusive
# with 'build_ignore'
# manifest: null
