- name: Kubernetes cluster management
  hosts: "{{ target | default('all') }}"
  become: true
  vars: {}

  pre_tasks:
    - name: Update package cache if required
      when:
        - "ansible_facts.os_family == 'Debian'"
      ansible.builtin.apt:
        update_cache: true

  roles:
    - role: ais.core.kubernetes
  tasks: []
  post_tasks: []
  handlers: []
