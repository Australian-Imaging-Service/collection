# collection/.github/workflows/ansible-lint.yml
# https://github.com/ansible/ansible-lint
name: ansible-lint
on:
  push:
    branches:
      - 'main'
      - 'releases/**'
  pull_request:

jobs:
  build:
    name: Ansible Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run ansible-lint
        uses: ansible/ansible-lint@main
