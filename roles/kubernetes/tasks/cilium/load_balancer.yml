---
# tasks/cilium/load-balancer.yml
- name: Set load balancer facts
  ansible.builtin.set_fact:
    kubernetes_lb_ippool_blocks: "{{ kubernetes_lb_cidrs | map('community.general.dict_kv', 'cidr') | list }}"

- name: Cilium load balancer pool
  kubernetes.core.k8s:
    apply: true
    kubeconfig: "{{ kubernetes_kubeconfig }}"
    state: present
    template: cilium/lb-ippool.yaml.j2
